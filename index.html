<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HITRAN Spectral Explorer</title>
    <link rel="stylesheet" href="hitran.css">
</head>
<body>
    <header>
        <h1>HITRAN Spectral Explorer</h1>
        <p class="subtitle">Multi-Spectrum Molecular Absorption Line Database</p>
    </header>

    <main>
        <!-- Global controls -->
        <div class="controls">
            <div class="control-group">
                <label for="spectral-unit">Unit</label>
                <select id="spectral-unit">
                    <option value="wavelength">Wavelength (μm)</option>
                    <option value="wavenumber">Wavenumber (cm⁻¹)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="numin" id="numin-label">Min Wavelength (μm)</label>
                <input type="number" id="numin" value="4.17" step="0.1">
            </div>

            <div class="control-group">
                <label for="numax" id="numax-label">Max Wavelength (μm)</label>
                <input type="number" id="numax" value="5.56" step="0.1">
            </div>

            <div class="control-group">
                <label for="plot-type">Plot Type</label>
                <select id="plot-type">
                    <option value="cross-section">Cross Section</option>
                    <option value="stick">Stick Spectrum</option>
                </select>
            </div>

            <div class="control-group">
                <label for="y-scale">Y Scale</label>
                <select id="y-scale">
                    <option value="log">Logarithmic</option>
                    <option value="linear">Linear</option>
                </select>
            </div>

            <button id="plot-btn">Plot</button>
        </div>

        <!-- Y-axis scale controls -->
        <div class="scale-controls">
            <label class="scale-lock">
                <input type="checkbox" id="lock-y-scale">
                Lock Y scale
            </label>
            <label class="scale-param">Min <input type="text" id="y-min" placeholder="auto" class="scale-input"></label>
            <label class="scale-param">Max <input type="text" id="y-max" placeholder="auto" class="scale-input"></label>
            <button id="reset-scale-btn" class="scale-reset-btn">Auto</button>
        </div>

        <!-- Presets (additive toggle) -->
        <div class="presets">
            <span class="presets-label">Presets:</span>
            <button class="preset-btn" data-preset="combustion">Combustion Effluent (NO + CO₂ + H₂O)</button>
            <button class="preset-btn" data-preset="ambient">Ambient Atmosphere (CO₂ + H₂O)</button>
            <button class="preset-btn" data-preset="no-comparison">NO: Ambient vs Hot</button>
            <button class="preset-btn" data-preset="greenhouse">Greenhouse Gases (CO₂ + CH₄ + H₂O)</button>
            <button class="preset-btn" data-preset="ozone-window">Atmospheric Window + O₃</button>
            <button class="preset-btn" data-preset="methane-leak">CH₄ Leak Detection</button>
            <button class="preset-btn" data-preset="clear">Clear All</button>
        </div>

        <!-- Spectrum layers -->
        <div class="layers-panel">
            <div class="layers-header">
                <h2>Spectrum Layers</h2>
                <button id="add-layer-btn">+ Add Layer</button>
            </div>
            <div id="layers-container"></div>
        </div>

        <div class="export-bar">
            <button id="save-png-btn" class="export-btn">Save PNG</button>
            <button id="save-xlsx-btn" class="export-btn">Save XLSX</button>
        </div>

        <div class="chart-container">
            <canvas id="spectrum-canvas"></canvas>
            <div id="tooltip" class="tooltip"></div>
            <div id="legend" class="legend"></div>
        </div>

        <div class="info-panel">
            <div class="stat" id="stat-layers">
                <span class="stat-label">Active layers</span>
                <span class="stat-value">—</span>
            </div>
            <div class="stat" id="stat-lines">
                <span class="stat-label">Total lines</span>
                <span class="stat-value">—</span>
            </div>
            <div class="stat" id="stat-range">
                <span class="stat-label">Range</span>
                <span class="stat-value">—</span>
            </div>
        </div>

        <div class="line-table-container">
            <h2>Line Data</h2>
            <table id="line-table">
                <thead>
                    <tr>
                        <th>Layer</th>
                        <th id="th-spectral">ν (cm⁻¹)</th>
                        <th>S (cm/molecule)</th>
                        <th>γ<sub>air</sub> (cm⁻¹/atm)</th>
                        <th>E″ (cm⁻¹)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <script src="hitran-data.js"></script>
    <script src="hitran.js"></script>
</body>
</html>
